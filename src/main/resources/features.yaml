# Feature configuration for ML1M pipeline.
# Each feature defines how to extract a value from ML1MSample and convert it
# to a categorical or continuous feature for embedding lookup.
#
# Feature types:
#   categorical — hashed into embedding space via MurmurHash3(f_index || bucket_id) % hash_dim
#   continuous  — raw value used directly as embedding position
#
# Generic features (no "class" field) use reflection to access ML1MSample fields:
#   source: field name in ML1MSample
#   mapping:   map string values → bucket IDs (exact match)
#   boundaries: [a, b, c] splits value into buckets: ≤a→1, ≤b→2, ≤c→3, >c→4
#   offset:    add constant to value before using as bucket ID
#   default:   fallback bucket when mapping has no match
#
# Custom features ("class" field) instantiate the given Scala class with (index, name).

hash_dim: 1152921504606846976

features:
  # ── User demographic ──────────────────────────────────────────────
  - name: user_age
    index: 2
    type: categorical
    source: age

  - name: user_gender
    index: 3
    type: categorical
    source: gender
    mapping:
      M: 1
      F: 2
    default: 0

  - name: user_occupation
    index: 4
    type: categorical
    source: occupation

  # ── User rate std (bucketed) ─────────────────────────────────────
  - name: user_rate_std
    index: 6
    type: categorical
    source: user_rate_std
    boundaries: [0.0, 1.0, 2.0]

  - name: user_rate_std_7day
    index: 7
    type: categorical
    source: user_rate_std_7day
    boundaries: [0.0, 1.0, 2.0]

  - name: user_rate_std_15day
    index: 8
    type: categorical
    source: user_rate_std_15day
    boundaries: [0.0, 1.0, 2.0]

  - name: user_rate_std_30day
    index: 9
    type: categorical
    source: user_rate_std_30day
    boundaries: [0.0, 1.0, 2.0]

  # ── User rate std (continuous) ───────────────────────────────────
  - name: user_rate_std_continue
    index: 18
    type: continuous
    source: user_rate_std

  - name: user_rate_std_7day_continue
    index: 19
    type: continuous
    source: user_rate_std_7day

  - name: user_rate_std_15day_continue
    index: 21
    type: continuous
    source: user_rate_std_15day

  - name: user_rate_std_30day_continue
    index: 22
    type: continuous
    source: user_rate_std_30day

  # ── User movie rate count (bucketed) ─────────────────────────────
  - name: user_movie_rate_cnt
    index: 10
    type: categorical
    source: user_rate_cnt
    boundaries: [10, 30, 50, 100]

  - name: user_movie_rate_cnt_7day
    index: 11
    type: categorical
    source: user_rate_7day_cnt
    boundaries: [10, 30, 50, 100]

  - name: user_movie_rate_cnt_15day
    index: 12
    type: categorical
    source: user_rate_15day_cnt
    boundaries: [0, 10, 30, 50, 100]

  - name: user_movie_rate_cnt_30day
    index: 13
    type: categorical
    source: user_rate_30day_cnt
    boundaries: [0, 10, 30, 50, 100]

  # ── User avg rate (bucketed) ─────────────────────────────────────
  - name: user_avg_rate
    index: 14
    type: categorical
    source: user_avg_rate
    boundaries: [0.0, 3.0, 4.0]

  - name: user_avg_rate_7day
    index: 15
    type: categorical
    source: user_avg_rate_7day
    boundaries: [0.0, 3.0, 4.0]

  - name: user_avg_rate_15day
    index: 16
    type: categorical
    source: user_avg_rate_15day
    boundaries: [0.0, 3.0, 4.0]

  - name: user_avg_rate_30day
    index: 17
    type: categorical
    source: user_avg_rate_30day
    boundaries: [0.0, 3.0, 4.0]

  # ── User avg rate (continuous) ───────────────────────────────────
  - name: user_avg_rate_continue
    index: 23
    type: continuous
    source: user_avg_rate

  - name: user_avg_rate_7day_continue
    index: 24
    type: continuous
    source: user_avg_rate_7day

  - name: user_avg_rate_15day_continue
    index: 25
    type: continuous
    source: user_avg_rate_15day

  - name: user_avg_rate_30day_continue
    index: 26
    type: continuous
    source: user_avg_rate_30day

  # ── Item features ────────────────────────────────────────────────
  - name: movie_title
    index: 102
    type: categorical
    class: featurizer.ml1m.MovieTitle

  - name: movie_genres
    index: 103
    type: categorical
    class: featurizer.ml1m.MovieGenres

  - name: movie_rate_count
    index: 104
    type: categorical
    source: movie_rate_count
    boundaries: [2, 5, 10, 20, 50, 100, 200, 500, 1000]

  - name: movie_avg_rate
    index: 105
    type: categorical
    source: movie_avg_rate
    boundaries: [0.0, 1.0, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5]

  - name: movie_genre_cnt
    index: 106
    type: categorical
    source: movie_genre_cnt
    boundaries: [1, 2]

  - name: item_hot_rank
    index: 107
    type: categorical
    source: movie_hot_rank
    boundaries: [100, 500, 2000]

  - name: movie_publish_year
    index: 108
    type: categorical
    source: movie_publish_year
    boundaries: [0, 1970, 1980, 1990, 2000, 2010]

  - name: movie_avg_rate_continue
    index: 109
    type: continuous
    source: movie_avg_rate

  # ── Context features ─────────────────────────────────────────────
  - name: context_time_hour
    index: 201
    type: categorical
    source: time_hour
    offset: 1

  - name: context_time_area
    index: 202
    type: categorical
    source: time_area
    offset: 1

  - name: context_time_week
    index: 203
    type: categorical
    source: week_day

  - name: context_is_weekend
    index: 204
    type: categorical
    source: week_day
    mapping:
      6: 2
      7: 2
    default: 1

  # ── User behavior: movie rate sequences ──────────────────────────
  - name: user_movie_rate
    index: 301
    type: categorical
    class: featurizer.ml1m.UserMovieRate

  - name: user_movie_rate_1day
    index: 302
    type: categorical
    class: featurizer.ml1m.UserMovieRate1Day

  - name: user_movie_rate_3day
    index: 303
    type: categorical
    class: featurizer.ml1m.UserMovieRate3Day

  - name: user_movie_rate_7day
    index: 304
    type: categorical
    class: featurizer.ml1m.UserMovieRate7Day

  - name: user_movie_rate_15day
    index: 305
    type: categorical
    class: featurizer.ml1m.UserMovieRate15Day

  # ── User behavior: genre rate sequences ──────────────────────────
  - name: user_genres_rate
    index: 306
    type: categorical
    class: featurizer.ml1m.UserGenresRate

  - name: user_genres_rate_1day
    index: 307
    type: categorical
    class: featurizer.ml1m.UserGenresRate1Day

  - name: user_genres_rate_3day
    index: 308
    type: categorical
    class: featurizer.ml1m.UserGenresRate3Day

  - name: user_genres_rate_7day
    index: 309
    type: categorical
    class: featurizer.ml1m.UserGenresRate7Day

  - name: user_genres_rate_15day
    index: 310
    type: categorical
    class: featurizer.ml1m.UserGenresRate15Day

  # ── User behavior: genre rate count sequences ────────────────────
  - name: user_genres_rate_cnts
    index: 312
    type: categorical
    class: featurizer.ml1m.UserGenresRateCnts

  - name: user_genres_rate_cnt_1days
    index: 313
    type: categorical
    class: featurizer.ml1m.UserGenresRateCnt1Days

  - name: user_genres_rate_cnt_3days
    index: 314
    type: categorical
    class: featurizer.ml1m.UserGenresRateCnt3Days

  - name: user_genres_rate_cnt_7days
    index: 315
    type: categorical
    class: featurizer.ml1m.UserGenresRateCnt7Days

  - name: user_genres_rate_cnt_15days
    index: 316
    type: categorical
    class: featurizer.ml1m.UserGenresRateCnt15Days

  # ── User top genres ──────────────────────────────────────────────
  - name: user_top3_genres
    index: 317
    type: categorical
    class: featurizer.ml1m.UserTop3Genres

  # ── Watch same genre ─────────────────────────────────────────────
  - name: user_watch_same_genre
    index: 351
    type: categorical
    class: featurizer.ml1m.UserWatchSameGenre

  - name: user_watch_same_genre_1day
    index: 352
    type: categorical
    class: featurizer.ml1m.UserWatchSameGenre1Day

  - name: user_watch_same_genre_3day
    index: 353
    type: categorical
    class: featurizer.ml1m.UserWatchSameGenre3Day

  - name: user_watch_same_genre_7day
    index: 354
    type: categorical
    class: featurizer.ml1m.UserWatchSameGenre7Day

  - name: user_watch_same_genre_15day
    index: 355
    type: categorical
    class: featurizer.ml1m.UserWatchSameGenre15Day

  # ── Same genre avg rate ──────────────────────────────────────────
  - name: user_same_genre_avg_rate
    index: 356
    type: categorical
    class: featurizer.ml1m.UserSameGenreAvgRate

  - name: user_same_genre_avg_rate_continue
    index: 357
    type: continuous
    class: featurizer.ml1m.UserSameGenreAvgRateContinue

# Cross features (feature crosses for CTR/ranking models)
cross_features:
  enabled: false
  pairs:
